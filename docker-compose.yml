version: "3.8"

services:
  # Development server with hot reload
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    command: npm run dev
    networks:
      - feedback-network

  # Preview production build
  frontend-preview:
    build:
      context: .
      dockerfile: Dockerfile
      target: preview
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=production
    networks:
      - feedback-network

networks:
  feedback-network:
    driver: bridge
