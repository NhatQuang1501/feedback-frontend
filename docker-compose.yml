services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
    command: >
      sh -c "npm ci --silent && npm run dev"
    networks:
      - feedback-network

  frontend-preview:
    build:
      context: .
      dockerfile: Dockerfile
      target: preview
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=production
    networks:
      - feedback-network

networks:
  feedback-network:
    driver: bridge

volumes:
  node_modules:
